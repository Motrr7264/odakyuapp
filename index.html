<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>のりかえ早見 — Shonandai to Shinjuku</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { --navy: #1f3a93; --amber: #e8742c; --cream: #faf7f2; --paper: #ffffff; --ink: #1a1d29; --ink-soft: #5b5f72; --line-grey: #d8d4ca; --good-green: #2f8f5b; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--cream); color: var(--ink); font-family: 'Zen Kaku Gothic New', sans-serif; line-height: 1.6; }
header { background: var(--navy); color: white; padding: 40px 24px 60px; text-align: center; }
h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; margin-bottom: 8px; }
.accent { color: var(--amber); }
main { max-width: 800px; margin: 0 auto; padding: 0 20px 80px; }
.panel { background: var(--paper); border: 1px solid var(--line-grey); border-radius: 14px; margin-top: -30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
.controls { padding: 25px; border-bottom: 1px solid var(--line-grey); }
.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
.field label { display: block; font-size: 11px; font-weight: 900; color: var(--ink-soft); margin-bottom: 5px; }
select, input { width: 100%; padding: 10px; border: 1.5px solid var(--line-grey); border-radius: 8px; font-size: 16px; background: var(--cream); height: 44px; }
.results { padding: 25px; }
.results-empty { text-align: center; padding: 40px; color: var(--ink-soft); font-weight: 700; }
.option-card { border: 1.5px solid var(--line-grey); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
.option-card.best { border-color: var(--good-green); background: linear-gradient(180deg, rgba(47,143,91,0.05), transparent); }
.option-time { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; }
.leg { display: grid; grid-template-columns: 70px 1fr; gap: 10px; padding: 8px 0; align-items: center; border-left: 3px solid var(--line-grey); margin-left: 10px; padding-left: 15px; }
.leg-time { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
.type-chip { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; color: white; display: inline-block; }
</style>
</head>
<body>

<header>
  <div class="hero-inner">
    <h1>ODAKYU <span class="accent">RACE</span></h1>
    <p style="font-size: 14px; opacity: 0.8;">SFC Student Edition / Official Data Mode</p>
  </div>
</header>

<main>
  <div class="panel">
    <div class="controls">
      <div class="controls-grid">
        <div class="field"><label>FROM</label><select id="from-select"><option value="湘南台">湘南台</option></select></div>
        <div class="field"><label>TO</label><select id="to-select"><option value="新宿">新宿</option></select></div>
      </div>
      <div class="controls-grid">
        <div class="field"><label>DEPARTURE TIME</label><input type="time" id="time-input" value="08:00"></div>
        <div class="field"><label>CONDITION</label><div style="padding: 10px; font-size: 14px; font-weight: bold; color: var(--navy);">平日ダイヤ (新宿方面)</div></div>
      </div>
    </div>
    <div id="results" class="results"></div>
  </div>
</main>

<script>
let connections = [];
const MIN_TRANSFER = 1; 

async function init() {
  try {
    const res = await fetch('csa_connections_odakyu.json');
    connections = await res.json();
    search(); // 初期読み込み時に1回実行
  } catch (e) {
    document.getElementById('results').innerHTML = "データの読み込みに失敗しました。";
  }
}

document.getElementById('time-input').onchange = search;

function search() {
  const startMin = timeToMin(document.getElementById('time-input').value);
  const result = findRoute("湘南台", "新宿", startMin);
  render(result);
}

function timeToMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function findRoute(start, end, startMin) {
  const bestArr = { [start]: startMin };
  const cameFrom = {};

  connections.forEach(c => {
    const dep = timeToMin(c.departure_time);
    const arr = timeToMin(c.arrival_time);
    if (bestArr[c.departure_station] !== undefined) {
      const ready = (cameFrom[c.departure_station]?.run_id === c.run_id) ? bestArr[c.departure_station] : bestArr[c.departure_station] + MIN_TRANSFER;
      if (dep >= ready) {
        if (bestArr[c.arrival_station] === undefined || arr < bestArr[c.arrival_station]) {
          bestArr[c.arrival_station] = arr;
          cameFrom[c.arrival_station] = c;
        }
      }
    }
  });

  if (!bestArr[end]) return null;
  const path = [];
  let curr = end;
  while (cameFrom[curr]) {
    path.unshift(cameFrom[curr]);
    curr = cameFrom[curr].departure_station;
  }
  return path;
}

function render(path) {
  const resDiv = document.getElementById('results');
  if (!path) {
    resDiv.innerHTML = '<div class="results-empty">指定の時間以降に新宿へ向かう経路が見つかりませんでした。<br>08:00〜09:00の間で試してみてください。</div>';
    return;
  }

  const arrival = path[path.length - 1].arrival_time;
  const totalTime = timeToMin(arrival) - timeToMin(path[0].departure_time);
  
  let html = `<div class="option-card best">
    <div class="option-top"><span class="option-time">${arrival} 着</span><span style="font-size:12px; font-weight:700;">所要 ${totalTime}分</span></div>
    <div class="legs">`;
  
  path.forEach((l, idx) => {
    if (idx > 0 && path[idx-1].run_id !== l.run_id) html += `<div style="padding-left:25px; color:var(--amber); font-size:12px; font-weight:700;">↓ 乗り換え (${l.departure_station})</div>`;
    const color = l.train_type === '快速急行' ? '#1f3a93' : (l.train_type === '急行' ? '#e85d3e' : '#6b7280');
    html += `<div class="leg">
      <div class="leg-time">${l.departure_time}</div>
      <div><span class="type-chip" style="background:${color}">${l.train_type}</span><br>
      <span style="font-size:13px; font-weight:700;">${l.departure_station} ➔ ${l.arrival_station}</span></div>
    </div>`;
  });
  html += `</div></div>`;
  resDiv.innerHTML = html;
}

init();
</script>
</body>
</html>
