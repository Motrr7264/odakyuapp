<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>のりかえ早見 — Odakyu Line (SFC Edition)</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1f3a93; --amber: #e8742c; --cream: #faf7f2; --paper: #ffffff;
  --ink: #1a1d29; --ink-soft: #5b5f72; --line-grey: #d8d4ca; --good-green: #2f8f5b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--cream); color: var(--ink); font-family: 'Zen Kaku Gothic New', sans-serif; }

header.hero { background: var(--navy); color: white; padding: 48px 24px 64px; text-align: center; }
.hero-inner { max-width: 800px; margin: 0 auto; }
.eyebrow { display: inline-flex; background: rgba(232,116,44,0.15); color: var(--amber); border: 1px solid var(--amber); padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 700; margin-bottom: 16px; }
h1.title { font-family: 'Space Grotesk', sans-serif; font-size: 42px; line-height: 1.1; margin-bottom: 10px; }
.accent { color: var(--amber); }

main { max-width: 800px; margin: 0 auto; padding: 0 24px 80px; }
.panel { background: var(--paper); border: 1px solid var(--line-grey); border-radius: 14px; margin-top: -32px; box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
.controls { padding: 24px; border-bottom: 1px solid var(--line-grey); }
.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.field label { display: block; font-size: 11px; font-weight: 900; color: var(--ink-soft); margin-bottom: 6px; text-transform: uppercase; }
select, input { width: 100%; padding: 10px; border: 1.5px solid var(--line-grey); border-radius: 8px; font-size: 16px; background: var(--cream); height: 44px; }

.results { padding: 24px; }
.option-card { border: 1.5px solid var(--line-grey); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.option-card.best { border-color: var(--good-green); background: linear-gradient(180deg, rgba(47,143,91,0.05), transparent); }
.option-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 15px; }
.option-time { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; }
.leg { display: grid; grid-template-columns: 75px 1fr; gap: 10px; padding: 10px 0; align-items: center; border-left: 3px solid var(--line-grey); margin-left: 10px; padding-left: 15px; }
.leg-time { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--ink-soft); }
.type-chip { font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 4px; color: white; display: inline-block; margin-bottom: 4px; }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <span class="eyebrow">ODAKYU LINE</span>
    <h1 class="title">待つ？乗る？<br><span class="accent">最適ルート判定。</span></h1>
    <p style="opacity:0.8; font-size:14px;">SFC Student Edition / Logic Simulation Mode</p>
  </div>
</header>

<main>
  <div class="panel">
    <div class="controls">
      <div class="controls-grid">
        <div class="field"><label>出発駅</label><select id="from-select"></select></div>
        <div class="field"><label>到着駅</label><select id="to-select"></select></div>
      </div>
      <div class="controls-grid">
        <div class="field"><label>出発時刻</label><input type="time" id="time-input" value="08:00"></div>
        <div class="field"><label>シミュレーション</label><div style="padding:10px; font-weight:bold; color:var(--navy); font-size:14px;">標準ダイヤ予測</div></div>
      </div>
    </div>
    <div id="results" class="results"></div>
  </div>
</main>

<script>
const STATIONS = ["湘南台", "大和", "相模大野", "町田", "新百合ケ丘", "登戸", "下北沢", "代々木上原", "新宿"];
// 駅ごとの新宿までの距離（分）の目安
const DISTANCE = { "湘南台": 55, "大和": 45, "相模大野": 35, "町田": 32, "新百合ケ丘": 23, "登戸": 16, "下北沢": 7, "代々木上原": 5, "新宿": 0 };

window.onload = () => {
    const fS = document.getElementById('from-select');
    const tS = document.getElementById('to-select');
    STATIONS.forEach(s => { fS.add(new Option(s, s)); tS.add(new Option(s, s)); });
    fS.value = "湘南台"; tS.value = "新宿";
    [fS, tS, document.getElementById('time-input')].forEach(el => el.onchange = simulate);
    simulate();
};

function timeToMin(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
}

function minToTime(m) {
    const h = Math.floor(m / 60) % 24;
    const mm = m % 60;
    return `${h.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;
}

// 💡 予測アルゴリズム
function simulate() {
    const from = document.getElementById('from-select').value;
    const to = document.getElementById('to-select').value;
    const startMin = timeToMin(document.getElementById('time-input').value);
    const resDiv = document.getElementById('results');

    if (STATIONS.indexOf(from) >= STATIONS.indexOf(to)) {
        resDiv.innerHTML = '<div class="results-empty">下り方面の予測には未対応です</div>';
        return;
    }

    const travelTime = DISTANCE[from] - DISTANCE[to];
    
    // 3つのパターンを予測
    const patterns = [
        { type: "快速急行", interval: 20, speed: 1.0, color: "#1f3a93" },
        { type: "急行", interval: 15, speed: 1.1, color: "#e85d3e" },
        { type: "各駅停車", interval: 10, speed: 1.5, color: "#6b7280" }
    ];

    let html = `<div style="font-size:11px; font-weight:900; margin-bottom:15px; color:var(--ink-soft); letter-spacing:0.1em;">PREDICTED OPTIONS</div>`;

    patterns.forEach((p, i) => {
        // 次の電車が来る時間を計算（何分おき、のロジック）
        const waitTime = p.interval - (startMin % p.interval);
        const depMin = startMin + waitTime;
        const duration = Math.floor(travelTime * p.speed);
        const arrMin = depMin + duration;

        html += `
        <div class="option-card ${i === 0 ? 'best' : ''}">
            <div class="option-top">
                <span class="option-time">${minToTime(arrMin)} 着</span>
                <span style="font-size:12px; font-weight:700;">約 ${duration}分</span>
            </div>
            <div class="legs">
                <div class="leg">
                    <div class="leg-time">${minToTime(depMin)}</div>
                    <div>
                        <span class="type-chip" style="background:${p.color}">${p.type}</span><br>
                        <span style="font-size:14px; font-weight:700;">${from} ➔ ${to}</span>
                    </div>
                </div>
                <div class="leg" style="border:none;">
                    <div class="leg-time">${minToTime(arrMin)}</div>
                    <div style="font-weight:700;">${to} 到着</div>
                </div>
            </div>
        </div>`;
    });

    resDiv.innerHTML = html;
}
</script>
</body>
</html>
