<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>のりかえ早見 — Odakyu Line (SFC Edition)</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1f3a93; --amber: #e8742c; --cream: #faf7f2; --paper: #ffffff;
  --ink: #1a1d29; --ink-soft: #5b5f72; --line-grey: #d8d4ca; --good-green: #2f8f5b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--cream); color: var(--ink); font-family: 'Zen Kaku Gothic New', sans-serif; line-height: 1.6; }
header { background: var(--navy); color: white; padding: 40px 24px 60px; text-align: center; }
h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; margin-bottom: 8px; }
.accent { color: var(--amber); }
main { max-width: 800px; margin: 0 auto; padding: 0 20px 80px; }
.panel { background: var(--paper); border: 1px solid var(--line-grey); border-radius: 14px; margin-top: -30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
.controls { padding: 25px; border-bottom: 1px solid var(--line-grey); }
.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
.field label { display: block; font-size: 11px; font-weight: 900; color: var(--ink-soft); margin-bottom: 5px; }
select, input { width: 100%; padding: 10px; border: 1.5px solid var(--line-grey); border-radius: 8px; font-size: 16px; background: var(--cream); height: 44px; }
.swap-btn { background: #fbe4d0; border: none; color: var(--amber); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; margin: -10px auto 10px; display: block; }
.toggle { display: flex; background: var(--cream); border-radius: 8px; padding: 3px; gap: 3px; }
.toggle button { flex: 1; border: none; background: transparent; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 700; color: var(--ink-soft); }
.toggle button.active { background: var(--navy); color: white; }
.results { padding: 25px; }
.results-empty { text-align: center; padding: 40px; color: var(--ink-soft); font-weight: 700; }
.option-card { border: 1.5px solid var(--line-grey); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
.option-card.best { border-color: var(--good-green); background: linear-gradient(180deg, rgba(47,143,91,0.05), transparent); }
.option-time { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; }
.leg { display: grid; grid-template-columns: 70px 1fr; gap: 10px; padding: 8px 0; align-items: center; border-left: 3px solid var(--line-grey); margin-left: 10px; padding-left: 15px; }
.leg-time { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
.type-chip { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; color: white; margin-bottom: 4px; display: inline-block; }
</style>
</head>
<body>

<header>
  <div class="hero-inner">
    <h1>ODAKYU <span class="accent">RACE</span></h1>
    <p style="font-size: 14px; opacity: 0.8;">SFC Student Edition / Ekispert API v1.0</p>
  </div>
</header>

<main>
  <div class="panel">
    <div class="controls">
      <div class="controls-grid">
        <div class="field"><label>FROM</label><select id="from-select"></select></div>
        <div class="field"><label>TO</label><select id="to-select"></select></div>
      </div>
      <button class="swap-btn" id="swap-btn">⇅</button>
      <div class="controls-grid">
        <div class="field"><label>TIME</label><input type="time" id="time-input" value="09:00"></div>
        <div class="field">
          <label>TYPE</label>
          <div class="toggle"><button id="dep-btn" class="active">出発</button><button id="arr-btn">到着</button></div>
        </div>
      </div>
    </div>
    <div id="results" class="results"><div class="results-empty">駅を選択してください</div></div>
  </div>
</main>

<script>
const KEY = 'LE_eWWAAeLcqGQ3g';
let mode = 'departure';

// 💡 解決の鍵：小田急線の「駅コード（ID）」を直接指定
const ODAKYU = [
  { name: "新宿", code: "22513" },
  { name: "代々木上原", code: "22931" },
  { name: "下北沢", code: "22728" },
  { name: "経堂", code: "22656" },
  { name: "成城学園前", code: "22765" },
  { name: "登戸", code: "23030" },
  { name: "向ケ丘遊園", code: "23063" },
  { name: "新百合ケ丘", code: "22771" },
  { name: "町田", code: "22894" },
  { name: "相模大野", code: "22709" },
  { name: "海老名", code: "22557" },
  { name: "本厚木", code: "22938" },
  { name: "伊勢原", code: "22521" },
  { name: "秦野", code: "22849" },
  { name: "小田原", code: "22621" },
  { name: "中央林間", code: "22791" },
  { name: "大和", code: "23098" },
  { name: "湘南台", code: "23075" },
  { name: "藤沢", code: "22863" },
  { name: "片瀬江ノ島", code: "22591" },
  { name: "多摩センター", code: "22744" },
  { name: "唐木田", code: "22588" }
];

window.onload = () => {
  const fromS = document.getElementById('from-select');
  const toS = document.getElementById('to-select');
  ODAKYU.forEach(s => {
    fromS.add(new Option(s.name, s.code));
    toS.add(new Option(s.name, s.code));
  });
  fromS.value = "23075"; // 湘南台
  toS.value = "22513";   // 新宿

  document.getElementById('dep-btn').onclick = () => { mode='departure'; updateUI(); search(); };
  document.getElementById('arr-btn').onclick = () => { mode='arrival'; updateUI(); search(); };
  document.getElementById('swap-btn').onclick = () => { const t=fromS.value; fromS.value=toS.value; toS.value=t; search(); };
  [fromS, toS, document.getElementById('time-input')].forEach(el => el.onchange = search);
  search();
};

function updateUI() {
  document.getElementById('dep-btn').classList.toggle('active', mode==='departure');
  document.getElementById('arr-btn').classList.toggle('active', mode==='arrival');
}

async function search() {
  const f = document.getElementById('from-select').value;
  const t = document.getElementById('to-select').value;
  const tm = document.getElementById('time-input').value.replace(':','');
  const resDiv = document.getElementById('results');

  resDiv.innerHTML = '<div class="results-empty">🔄 問い合わせ中...</div>';

  // 💡 駅コード（数字）をそのまま from と to に入れる
  const url = `https://api.ekispert.jp/v1/json/search/course/light?key=${KEY}&from=${f}&to=${t}&time=${tm}&searchType=${mode}`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (data.ResultSet.Error) {
      resDiv.innerHTML = `<div class="results-empty" style="color:red;">⚠️ ${data.ResultSet.Error.Message}</div>`;
      return;
    }

    if (!data.ResultSet.Course) {
      resDiv.innerHTML = '<div class="results-empty">❌ 経路が見つかりませんでした</div>';
      return;
    }

    render(data.ResultSet.Course);
  } catch (err) {
    resDiv.innerHTML = '<div class="results-empty">⚠️ 通信エラー</div>';
  }
}

function render(courseData) {
  const resDiv = document.getElementById('results');
  let courses = Array.isArray(courseData) ? courseData : [courseData];
  let html = `<div style="font-size:12px; font-weight:900; margin-bottom:15px; color:var(--ink-soft);">RESULT</div>`;

  courses.slice(0, 3).forEach((c, i) => {
    const arrival = c.Route.ArrivalState.Datetime.text.split('T')[1].substring(0,5);
    html += `<div class="option-card ${i===0?'best':''}">
      <div class="option-top">
        <span class="option-time">${arrival} 着</span>
        <span style="font-size:12px; font-weight:700;">${c.TimeSummary.Total}分</span>
      </div>
      <div class="legs">`;
    
    let lines = Array.isArray(c.Route.Line) ? c.Route.Line : [c.Route.Line];
    lines.forEach((l, idx) => {
      if (idx > 0) html += `<div class="transfer">↓ 乗り換え</div>`;
      const depT = l.DepartureState.Datetime.text.split('T')[1].substring(0,5);
      const color = l.Name.includes('急') ? '#e85d3e' : (l.Name.includes('快速') ? '#1f3a93' : '#6b7280');
      html += `<div class="leg">
        <div class="leg-time">${depT}</div>
        <div>
          <span class="type-chip" style="background:${color}">${l.Name}</span><br>
          <span style="font-size:13px; font-weight:700;">${l.DepartureState.Name} ➔ ${l.ArrivalState.Name}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  resDiv.innerHTML = html;
}
</script>
</body>
</html>
