<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>のりかえ早見 — Odakyu Line Departure Race (SFC Edition)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1f3a93;
  --navy-deep: #142a6b;
  --amber: #e8742c;
  --amber-soft: #fbe4d0;
  --cream: #faf7f2;
  --paper: #ffffff;
  --ink: #1a1d29;
  --ink-soft: #5b5f72;
  --line-grey: #d8d4ca;
  --good-green: #2f8f5b;
  --font-display: 'Space Grotesk', 'Zen Kaku Gothic New', sans-serif;
  --font-body: 'Zen Kaku Gothic New', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--cream); color: var(--ink); font-family: var(--font-body); line-height: 1.6; -webkit-font-smoothing: antialiased; }
::selection { background: var(--amber-soft); }

header.hero { background: var(--navy); color: white; padding: 48px 24px 64px; position: relative; overflow: hidden; }
.hero-inner { max-width: 920px; margin: 0 auto; }
.eyebrow-container { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
.eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--amber); background: rgba(232, 116, 44, 0.14); border: 1px solid rgba(232, 116, 44, 0.35); padding: 6px 14px; border-radius: 100px; }
.sfc-badge { display: inline-flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); padding: 6px 16px; border-radius: 100px; font-family: var(--font-display); font-size: 13px; font-weight: 700; color: white; }
h1.title { font-family: var(--font-display); font-size: clamp(32px, 6vw, 54px); font-weight: 700; line-height: 1.1; margin-bottom: 16px; }
h1.title .accent { color: var(--amber); }

main { max-width: 920px; margin: 0 auto; padding: 0 24px 96px; }
.panel { background: var(--paper); border: 1px solid var(--line-grey); border-radius: 14px; margin-top: -32px; position: relative; z-index: 2; box-shadow: 0 12px 32px -16px rgba(20, 42, 107, 0.18); }
.controls { padding: 24px 28px 20px; border-bottom: 1px solid var(--line-grey); }
.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.field label.field-label { display: flex; align-items: center; font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--ink-soft); margin-bottom: 8px; }
.field select, .field input[type="time"] { width: 100%; padding: 10px 14px; border: 1.5px solid var(--line-grey); border-radius: 9px; font-size: 16px; background: var(--cream); height: 44px; }
.swap-row { display: flex; align-items: center; gap: 12px; margin: -4px 0 16px; }
.swap-btn { background: var(--amber-soft); border: none; color: var(--amber); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.daytype-toggle { display: flex; background: var(--cream); border: 1.5px solid var(--line-grey); border-radius: 9px; padding: 3px; gap: 3px; height: 44px; }
.daytype-toggle button { flex: 1; font-family: var(--font-display); font-size: 14px; font-weight: 600; border: none; background: transparent; border-radius: 6px; cursor: pointer; color: var(--ink-soft); }
.daytype-toggle button.active { background: var(--navy); color: white; }

.results { padding: 28px; }
.results-empty { text-align: center; padding: 48px 24px; color: var(--ink-soft); }
.results-heading { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--ink-soft); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.time-badge { background: var(--navy); color: white; padding: 4px 10px; border-radius: 6px; font-size: 13px; }

.option-card { border: 1.5px solid var(--line-grey); border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
.option-card.best { border-color: var(--good-green); background: linear-gradient(180deg, rgba(47,143,91,0.05), transparent 60%); }
.option-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.option-arrival { font-family: var(--font-display); font-size: 28px; font-weight: 700; }
.option-arrival-label { font-size: 13px; color: var(--ink-soft); font-weight: 600;}

.legs { display: flex; flex-direction: column; }
.leg { display: grid; grid-template-columns: 90px 1fr; gap: 14px; align-items: center; padding: 8px 0; }
.leg-time { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--ink-soft); }
.leg-detail { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 14px; }
.leg-type-chip { font-family: var(--font-display); font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 5px; color: white; white-space: nowrap; }
.transfer-marker { display: flex; align-items: center; gap: 10px; padding: 4px 0 4px 90px; font-size: 12px; color: var(--ink-soft); font-weight: 700; }
.transfer-marker::before { content: "↓"; color: var(--amber); }

footer { text-align: center; padding: 32px 24px; font-size: 13px; color: var(--ink-soft); }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <div class="eyebrow-container">
      <span class="eyebrow">小田急線</span>
      <div class="sfc-badge"><span>SFC Student Edition</span></div>
    </div>
    <h1 class="title">待つ？乗る？<br><span class="accent">最適ルートを即判定。</span></h1>
    <p class="hero-sub">フリープランAPI対応版。プロのデータで検索します。</p>
  </div>
</header>

<main>
  <div class="panel">
    <div class="controls">
      <div class="controls-grid">
        <div class="field">
          <label class="field-label">乗車駅</label>
          <select id="origin-select"></select>
        </div>
        <div class="field">
          <label class="field-label">目的駅</label>
          <select id="dest-select"></select>
        </div>
      </div>
      <div class="swap-row"><button class="swap-btn" id="swap-btn">⇅</button></div>
      <div class="controls-grid">
        <div class="field">
          <label class="field-label">時刻</label>
          <input type="time" id="time-input" value="09:00">
        </div>
        <div class="field">
          <label class="field-label">条件</label>
          <div class="daytype-toggle">
            <button id="dep-btn" class="active">出発</button>
            <button id="arr-btn">到着</button>
          </div>
        </div>
      </div>
    </div>
    <div class="results" id="results"><div class="results-empty">駅を選んでください。</div></div>
  </div>
</main>

<script>
const API_KEY = 'LE_eWWAAeLcqGQ3g';
let timeMode = 'departure'; 

const ODAKYU_STATIONS = ["新宿", "代々木上原", "下北沢", "経堂", "成城学園前", "登戸", "向ケ丘遊園", "新百合ケ丘", "町田", "相模大野", "海老名", "本厚木", "伊勢原", "秦野", "小田原", "中央林間", "大和(神奈川県)", "湘南台", "藤沢", "片瀬江ノ島", "小田急多摩センター", "唐木田"];

window.onload = () => {
    const originSel = document.getElementById('origin-select');
    const destSel = document.getElementById('dest-select');
    ODAKYU_STATIONS.forEach(name => {
        originSel.add(new Option(name.replace(/\(.*\)/, ''), name)); 
        destSel.add(new Option(name.replace(/\(.*\)/, ''), name));
    });
    originSel.value = "湘南台"; destSel.value = "新宿";

    document.getElementById('dep-btn').onclick = () => { timeMode = 'departure'; updateBtns(); runSearch(); };
    document.getElementById('arr-btn').onclick = () => { timeMode = 'arrival'; updateBtns(); runSearch(); };
    document.getElementById('swap-btn').onclick = () => { const t = originSel.value; originSel.value = destSel.value; destSel.value = t; runSearch(); };
    [originSel, destSel, document.getElementById('time-input')].forEach(el => el.onchange = runSearch);
    runSearch();
};

function updateBtns() {
    document.getElementById('dep-btn').classList.toggle('active', timeMode === 'departure');
    document.getElementById('arr-btn').classList.toggle('active', timeMode === 'arrival');
}

async function runSearch() {
    const fromStation = document.getElementById('origin-select').value;
    const toStation = document.getElementById('dest-select').value;
    const timeStr = document.getElementById('time-input').value;
    if (!timeStr || fromStation === toStation) return;

    document.getElementById('results').innerHTML = `<div class="results-empty">🔄 駅すぱあとに問い合わせ中...</div>`;

    const formattedTime = timeStr.replace(':', '');
    // 💡 フリープラン用の「light」エンドポイントを使用
    const url = `https://api.ekispert.jp/v1/json/search/course/light?key=${API_KEY}&from=${encodeURIComponent(fromStation)}&to=${encodeURIComponent(toStation)}&time=${formattedTime}&searchType=${timeMode}`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        
        if (data.ResultSet.Error) {
            document.getElementById('results').innerHTML = `<div class="results-empty" style="color:red;">⚠️ APIエラー: ${data.ResultSet.Error.Message}</div>`;
            return;
        }
        renderResults(data);
    } catch (e) {
        document.getElementById('results').innerHTML = `<div class="results-empty">⚠️ 通信エラーが発生しました。</div>`;
    }
}

function renderResults(data) {
    const results = document.getElementById('results');
    if (!data.ResultSet.Course) { results.innerHTML = `<div class="results-empty">経路なし</div>`; return; }

    let courses = Array.isArray(data.ResultSet.Course) ? data.ResultSet.Course : [data.ResultSet.Course];
    let html = `<div class="results-heading"><span class="time-badge">Free Plan API</span> 検索結果</div>`;

    courses.forEach((course, i) => {
        const route = course.Route;
        const time = course.TimeSummary;
        const arrivalTime = route.ArrivalState.Datetime.text.split('T')[1].substring(0, 5);
        
        html += `<div class="option-card ${i===0?'best':''}">
            <div class="option-card-top"><span class="option-arrival">${arrivalTime} 着</span><span class="option-arrival-label">所要${time.Total}分</span></div>
            <div class="legs">`;

        let lines = Array.isArray(route.Line) ? route.Line : [route.Line];
        lines.forEach((l, li) => {
            if (li > 0) html += `<div class="transfer-marker">乗換</div>`;
            const depT = l.DepartureState.Datetime.text.split('T')[1].substring(0, 5);
            const color = l.Name.includes('急') ? '#e85d3e' : '#6b7280';
            html += `<div class="leg">
                <div class="leg-time">${depT}</div>
                <div class="leg-detail"><span class="leg-type-chip" style="background:${color}">${l.Name}</span><span>${l.DepartureState.Name} ➔ ${l.ArrivalState.Name}</span></div>
            </div>`;
        });
        html += `</div></div>`;
    });
    results.innerHTML = html;
}
</script>
</body>
</html>
